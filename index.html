<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ことばツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #fff8f6;
      min-height: 100vh;
    }

    /* ── 共通スクリーン ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 28px 18px 56px;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    .screen.active { display: flex; }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #c97b84;
      letter-spacing: 0.2em;
    }

    .back-btn {
      align-self: flex-start;
      background: none;
      border: none;
      color: #c97b84;
      font-size: 0.88rem;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }
    .back-btn:hover { opacity: 0.65; }

    /* ── トップ：呪文カード ── */
    .spell-card {
      background: linear-gradient(135deg, #fde8eb 0%, #fff4f6 100%);
      border: 2px solid #f0c4cb;
      border-radius: 20px;
      width: 100%;
      padding: 20px 22px 16px;
      margin-bottom: 26px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(201,123,132,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .spell-card:hover  { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(201,123,132,0.15); }
    .spell-card:active { transform: scale(0.98); }

    .spell-label {
      font-size: 0.7rem;
      color: #e0a0aa;
      letter-spacing: 0.2em;
      margin-bottom: 10px;
    }
    .spell-text {
      font-size: 1.08rem;
      font-weight: 700;
      color: #5a3d42;
      line-height: 1.65;
      transition: opacity 0.15s;
    }
    .spell-hint {
      font-size: 0.68rem;
      color: #d4a0a8;
      margin-top: 12px;
      text-align: right;
      letter-spacing: 0.06em;
    }

    /* ── つぶやきエリア ── */
    .tsubuyaki-card {
      background: #fff;
      border: 2px solid #f0c4cb;
      border-radius: 20px;
      width: 100%;
      padding: 16px 18px;
      margin-bottom: 26px;
      box-shadow: 0 4px 14px rgba(201,123,132,0.08);
    }
    .tsubuyaki-textarea {
      width: 100%;
      border: 1.5px solid #f0c4cb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.92rem;
      color: #5a3d42;
      line-height: 1.7;
      resize: none;
      outline: none;
      font-family: inherit;
      background: #fff8f9;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .tsubuyaki-textarea::placeholder { color: #d4a0a8; }
    .tsubuyaki-textarea:focus { border-color: #e08090; background: #fff; }
    .tsubuyaki-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #f4a0b0, #e07888);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .tsubuyaki-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .tsubuyaki-btn:active { transform: scale(0.98); }
    .tsubuyaki-btn:disabled { opacity: 0.55; cursor: default; transform: none; }
    .tsubuyaki-loading {
      text-align: center;
      font-size: 0.82rem;
      color: #c97b84;
      margin-top: 10px;
      min-height: 20px;
      letter-spacing: 0.06em;
    }

    /* ── トップ：セクションラベル ── */
    .section-label {
      font-size: 0.74rem;
      color: #c97b84;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
      width: 100%;
    }

    /* ── カテゴリーボタン ── */
    .cat-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-bottom: 14px;
    }
    .cat-btn {
      background: #fff;
      border: 2px solid #f0c4cb;
      border-radius: 999px;
      color: #c97b84;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 13px 22px;
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }
    .cat-btn:hover  { background: #fde8eb; transform: translateY(-1px); }
    .cat-btn:active { transform: scale(0.98); }

    /* ── ランキングボタン（トップ） ── */
    .ranking-top-btn {
      width: 100%;
      background: #fff;
      border: 2px solid #e8b8c0;
      border-radius: 14px;
      color: #c97b84;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .ranking-top-btn:hover  { background: #fde8eb; transform: translateY(-1px); }
    .ranking-top-btn:active { transform: scale(0.98); }

    /* ── カテゴリー一覧：ヘッダー ── */
    .list-header {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin-bottom: 20px;
    }
    .list-corgi { width: 88px; height: 102px; flex-shrink: 0; }
    .list-corgi svg { width: 100%; height: 100%; }

    .list-cat-badge {
      display: inline-block;
      font-size: 0.76rem;
      color: #e0a0aa;
      letter-spacing: 0.14em;
      background: #fde8eb;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 8px;
    }
    .list-sub {
      font-size: 0.76rem;
      color: #bfa8ab;
    }

    /* ── 言葉リスト ── */
    .word-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-item {
      background: #fff;
      border: 1.5px solid #f0c4cb;
      border-radius: 16px;
      padding: 18px 14px 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(201,123,132,0.05);
    }
    .word-text {
      flex: 1;
      font-size: 0.9rem;
      color: #5a3d42;
      line-height: 2.0;
    }
    .heart-count { display: none; }
    .heart-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .heart-btn:hover  { background: #fde8eb; }
    .heart-btn:active { background: #fbd0d8; }
    .heart-icon {
      font-size: 1.35rem;
      line-height: 1;
      display: block;
    }
    .heart-icon.pop { animation: heartPop 0.22s ease; }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.55); }
      100% { transform: scale(1); }
    }
    .heart-count {
      font-size: 0.68rem;
      color: #e0a0aa;
      font-weight: 700;
      min-width: 16px;
      text-align: center;
      min-height: 12px;
    }

    /* ── 1枚表示画面（ランダムでぽん） ── */
    .single-corgi { width: 140px; height: 162px; margin-bottom: 10px; }
    .single-corgi svg { width: 100%; height: 100%; }

    .single-cat-badge {
      display: inline-block;
      font-size: 0.74rem;
      color: #e0a0aa;
      letter-spacing: 0.14em;
      background: #fde8eb;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .single-card {
      background: #fff;
      border: 2px solid #f0c4cb;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(201,123,132,0.08);
    }
    .single-quote {
      font-size: 1rem;
      color: #5a3d42;
      line-height: 1.9;
    }
    .single-heart-row {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }
    .single-heart-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1.5px solid #f0c4cb;
      border-radius: 999px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #e0a0aa;
      font-weight: 600;
      transition: background 0.15s;
    }
    .single-heart-btn:hover  { background: #fde8eb; }
    .single-heart-btn:active { background: #fbd0d8; }
    .single-heart-icon { font-size: 1.1rem; }
    .single-heart-icon.pop { animation: heartPop 0.22s ease; }

    .action-btns {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #e89aa4;
      border: none;
      color: #fff;
    }
    .btn-primary:hover { background: #d9848e; }
    .btn-secondary {
      background: #fff;
      border: 2px solid #f0c4cb;
      color: #c97b84;
    }
    .btn-secondary:hover { background: #fde8eb; }

    /* ── 一覧ボタン（1枚表示画面の右下） ── */
    .list-link-btn {
      align-self: flex-end;
      margin-top: 14px;
      background: none;
      border: 1.5px solid #f0c4cb;
      border-radius: 999px;
      color: #c97b84;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 6px 16px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }
    .list-link-btn:hover { background: #fde8eb; }

    /* ── シンプル一覧（テキストのみ） ── */
    .simple-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .simple-list-item {
      background: #fff;
      border: 1.5px solid #f0c4cb;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.9rem;
      color: #5a3d42;
      line-height: 1.8;
      box-shadow: 0 2px 6px rgba(201,123,132,0.04);
    }

    /* ── ランダムでぽんボタン（トップ） ── */
    .random-btn {
      width: 100%;
      background: linear-gradient(135deg, #e89aa4, #d4788a);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(201,123,132,0.25);
      letter-spacing: 0.06em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .random-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .random-btn:active { transform: scale(0.98); }

    /* ── ランキング ── */
    .ranking-header {
      text-align: center;
      width: 100%;
      margin-bottom: 24px;
    }
    .ranking-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rank-item {
      background: #fff;
      border: 1.5px solid #f0c4cb;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(201,123,132,0.05);
    }
    .rank-num {
      font-size: 1.2rem;
      flex-shrink: 0;
      padding-top: 1px;
      min-width: 30px;
      text-align: center;
    }
    .rank-num.normal {
      font-size: 0.82rem;
      font-weight: 700;
      color: #d4a8b0;
      padding-top: 4px;
    }
    .rank-body { flex: 1; min-width: 0; }
    .rank-text {
      font-size: 0.9rem;
      color: #5a3d42;
      line-height: 1.8;
    }
    .rank-cat {
      font-size: 0.68rem;
      color: #d4a8b0;
      margin-top: 4px;
    }
    .rank-heart {
      flex-shrink: 0;
      font-size: 0.86rem;
      font-weight: 700;
      color: #e89aa4;
      display: flex;
      align-items: flex-start;
      gap: 2px;
      padding-top: 3px;
    }
    .empty-state {
      text-align: center;
      color: #d4a8b0;
      font-size: 0.88rem;
      padding: 48px 0;
      line-height: 2.2;
    }

    /* ── ホームボタン（各画面の右上・絶対配置） ── */
    .home-btn {
      position: absolute;
      top: 18px;
      right: 12px;
      background: #fff;
      border: 1.5px solid #f0c4cb;
      border-radius: 999px;
      color: #c97b84;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      z-index: 10;
      letter-spacing: 0.06em;
      box-shadow: 0 2px 8px rgba(201,123,132,0.12);
      transition: background 0.15s;
    }
    .home-btn:hover { background: #fde8eb; }

    /* ── ハート吹き出し ── */
    .heart-bubble-wrapper {
      position: fixed; pointer-events: none; z-index: 250; opacity: 0;
      animation: heartBubbleFade 10s ease forwards;
    }
    @keyframes heartBubbleFade {
      0%   { opacity: 0; transform: scale(0.78) translateY(10px); }
      7%   { opacity: 1; transform: scale(1.04) translateY(0); }
      13%  {              transform: scale(1)    translateY(0); }
      82%  { opacity: 1; transform: scale(1)    translateY(-2px); }
      100% { opacity: 0; transform: scale(0.96) translateY(-10px); }
    }
    .bubble-heart-svg { display: block; filter: drop-shadow(0 4px 14px rgba(201,100,120,0.18)); }
    .bubble-text {
      position: absolute; font-size: 0.77rem; color: #7a3042;
      line-height: 1.78; white-space: pre-line; text-align: center;
    }

    /* ── トップ画面：呪文カード周りのふわっとハート ── */
    .top-float-heart {
      position: fixed; pointer-events: none; z-index: 5; opacity: 0;
      animation-name: topHeartFloat;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    body:not(.on-top) .top-float-heart { display: none; }
    @keyframes topHeartFloat {
      0%   { opacity: 0;    transform: translateY(0)    translateX(0); }
      12%  { opacity: 0.75; }
      35%  { opacity: 0.7;  transform: translateY(-10px) translateX(var(--dx, 4px)); }
      60%  { opacity: 0.6;  transform: translateY(-5px)  translateX(var(--dx, 4px)); }
      82%  { opacity: 0.15; }
      100% { opacity: 0;    transform: translateY(-16px) translateX(calc(var(--dx, 4px) * 1.3)); }
    }

    /* ── 一覧画面の下部ナビ ── */
    .list-bottom-nav {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 20px;
      padding-top: 12px;
    }
  </style>
</head>
<body>

<!-- ════ トップ画面 ════ -->
<div id="screen-top" class="screen active">
  <div style="text-align:center; width:100%; margin-bottom:22px; padding-top:4px;">
    <div style="font-size:1.5rem; margin-bottom:4px;">🌸</div>
    <h1>ことばツール</h1>
  </div>

  <div class="spell-card" onclick="newSpell(this)">
    <div class="spell-label">✦ 今日の呪文 ✦</div>
    <div class="spell-text" id="spell-text"></div>
    <div class="spell-hint">タップで変える ↻</div>
  </div>

  <div class="section-label">📂 カテゴリーから探す</div>
  <div class="cat-grid" id="cat-grid"></div>

  <button class="ranking-top-btn" onclick="showRanking()">
    🏆 &nbsp;よく見た言葉ランキング
  </button>

  <div class="section-label" style="margin-top:10px;">💬 今の気持ちをつぶやく</div>
  <div class="tsubuyaki-card">
    <textarea class="tsubuyaki-textarea" id="tsubuyaki-input"
      rows="3" placeholder="今どんな気持ち？自由に書いてね…"></textarea>
    <button class="tsubuyaki-btn" id="tsubuyaki-btn" onclick="findWord()">
      ことばを探す ✦
    </button>
    <div class="tsubuyaki-loading" id="tsubuyaki-loading"></div>
  </div>
</div>

<!-- ════ 1枚表示画面（ランダムでぽん） ════ -->
<div id="screen-single" class="screen">
  <button class="home-btn" onclick="showScreen('screen-top')">🏠 ホーム</button>
  <button class="back-btn" onclick="showScreen('screen-top')">← もどる</button>
  <div id="single-corgi" class="single-corgi"></div>
  <div class="single-cat-badge" id="single-cat-badge"></div>
  <div class="single-card">
    <p class="single-quote" id="single-quote"></p>
    <div class="single-heart-row">
      <button class="single-heart-btn" id="single-heart-btn" onclick="tapSingleHeart()">
        <span class="single-heart-icon" id="single-heart-icon">♡</span>
        <span id="single-heart-count"></span>
      </button>
    </div>
  </div>
  <div class="action-btns">
    <button class="btn btn-secondary" onclick="showScreen('screen-top')">← 戻る</button>
    <button class="btn btn-primary" onclick="nextSingle()">もう1つ ✦</button>
  </div>
  <button class="list-link-btn" onclick="showList(currentSingleCat)">一覧を見る</button>
</div>

<!-- ════ カテゴリー一覧画面 ════ -->
<div id="screen-list" class="screen">
  <button class="home-btn" onclick="showScreen('screen-top')">🏠 ホーム</button>
  <button class="back-btn" onclick="showScreen('screen-single')">← もどる</button>
  <div style="width:100%; margin-bottom:16px;">
    <div class="list-cat-badge" id="list-cat-badge"></div>
  </div>
  <div class="word-list" id="word-list"></div>
  <div class="list-bottom-nav">
    <button class="btn btn-secondary" onclick="showScreen('screen-single')">← もどる</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-top')">🏠 ホーム</button>
  </div>
</div>

<!-- ════ ランキング画面 ════ -->
<div id="screen-ranking" class="screen">
  <button class="home-btn" onclick="showScreen('screen-top')">🏠 ホーム</button>
  <button class="back-btn" onclick="showScreen('screen-top')">← もどる</button>
  <div class="ranking-header">
    <div style="font-size:1.6rem; margin-bottom:6px;">🏆</div>
    <h1>よく見た言葉ランキング</h1>
    <div style="font-size:0.74rem; color:#d4a8b0; margin-top:8px; letter-spacing:0.08em;">ハートを押した回数順</div>
  </div>
  <div class="ranking-list" id="ranking-list"></div>
</div>


<!-- トップ画面：呪文カード周りのふわっとハート -->
<span id="tfh1" class="top-float-heart" style="font-size:13px;color:#f4a0b0;--dx:-3px;animation-duration:3.8s;animation-delay:0s;">♥</span>
<span id="tfh2" class="top-float-heart" style="font-size:11px;color:#e89aa4;--dx:5px;animation-duration:4.5s;animation-delay:1.2s;">♥</span>
<span id="tfh3" class="top-float-heart" style="font-size:15px;color:#f4b8c4;--dx:4px;animation-duration:3.2s;animation-delay:2.1s;">♥</span>
<span id="tfh4" class="top-float-heart" style="font-size:10px;color:#e0a0b0;--dx:-4px;animation-duration:5.0s;animation-delay:0.7s;">♥</span>
<span id="tfh5" class="top-float-heart" style="font-size:12px;color:#f4a0b0;--dx:3px;animation-duration:4.1s;animation-delay:1.8s;">♥</span>

<script>
  /* ════════════════════════════
     呪文フレーズ
  ════════════════════════════ */
  const SPELLS = [
    "これでいいのだ",
    "今の私にできることだけすればいい",
    "悩んでいるなら、課題にするなら何だろう？",
    "私はここにいるだけで役割を果たしている",
    "いいや、死ぬわけじゃないし",
    "嫌っていいよ、これが私なんでヨロシク",
    "なんとかなる、いつもなんとかしてきた",
    "一拍待ってみよう",
  ];

  /* ════════════════════════════
     言葉データ
  ════════════════════════════ */
  const words = {
    "しんどい・落ち込んでる": [
      "いいや！死ぬわけじゃないし。いつも乗り越えてきたでしょ？",
      "今日を生きているだけでよろしい。今はつらくても、必ずトンネルの出口はあります。",
      "大丈夫、一緒に考えよう",

  /* ════════════════════════════
     localStorage ハート管理
  ════════════════════════════ */
  function getHearts() {
    return JSON.parse(localStorage.getItem("kotoba_hearts") || "{}");
  }
  function saveHearts(h) {
    localStorage.setItem("kotoba_hearts", JSON.stringify(h));
  }

  /* ════════════════════════════
     呪文
  ════════════════════════════ */
  let lastSpellIdx = -1;
  function newSpell() {
    let idx;
    do { idx = Math.floor(Math.random() * SPELLS.length); }
    while (idx === lastSpellIdx && SPELLS.length > 1);
    lastSpellIdx = idx;
    const el = document.getElementById("spell-text");
    el.style.opacity = "0";
    setTimeout(() => { el.textContent = SPELLS[idx]; el.style.opacity = "1"; }, 140);
  }

  /* ════════════════════════════
     テキスト整形
  ════════════════════════════ */
  function formatQuote(text) {
    const pattern = text.length >= 20 ? /[。、]/g : /。/g;
    return text.replace(pattern, m => m + "\n").replace(/\n$/, "");
  }

  /* ════════════════════════════
     画面切替
  ════════════════════════════ */
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo(0, 0);
    document.body.classList.toggle("on-top", id === "screen-top");
    document.querySelectorAll(".heart-bubble-wrapper").forEach(el => el.remove());
  }

  /* ════════════════════════════
     カテゴリーボタン生成
  ════════════════════════════ */
  function buildCategoryButtons() {
    const grid = document.getElementById("cat-grid");
    Object.keys(words).forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.textContent = cat;
      btn.onclick = () => showCategory(cat);
      grid.appendChild(btn);
    });
  }

  /* ════════════════════════════
     1枚表示（カテゴリー・ランダム共通）
     mode = カテゴリー名 or null（全ランダム）
  ════════════════════════════ */
  let singleMode         = null; // null=全ランダム / "カテゴリー名"=カテゴリー固定
  let currentSingleQuote = "";
  let currentSingleCat   = "";   // 表示中の言葉の実カテゴリー

  function showSingle(mode) {
    singleMode = mode;

    // 抽選プール作成
    const pool = mode
      ? words[mode].map(q => ({ quote: q, cat: mode }))
      : Object.entries(words).flatMap(([cat, qs]) => qs.map(q => ({ quote: q, cat })));

    const pick = pool[Math.floor(Math.random() * pool.length)];
    currentSingleQuote = pick.quote;
    currentSingleCat   = pick.cat;

    // コーギー・カテゴリーバッジ
    document.getElementById("single-corgi").innerHTML = FACES[CATEGORY_FACE[pick.cat] || "gentle"];
    document.getElementById("single-cat-badge").textContent = pick.cat;

    // テキスト（フェードイン）
    const quoteEl = document.getElementById("single-quote");
    quoteEl.style.opacity = "0";
    setTimeout(() => { quoteEl.textContent = formatQuote(pick.quote); quoteEl.style.opacity = "1"; }, 120);

    refreshSingleHeart();
    showScreen("screen-single");
  }

  // トップの「ランダムでぽん」
  function showRandom() { showSingle(null); }

  // トップのカテゴリーボタン
  function showCategory(cat) { showSingle(cat); }

  // 1枚表示の「もう1つ」
  function nextSingle() { showSingle(singleMode); }

  /* ── ハート（1枚表示） ── */
  function refreshSingleHeart() {
    const count = getHearts()[currentSingleQuote] || 0;
    document.getElementById("single-heart-icon").textContent = count > 0 ? "♥" : "♡";
  }

  function tapSingleHeart() {
    const hearts = getHearts();
    hearts[currentSingleQuote] = (hearts[currentSingleQuote] || 0) + 1;
    saveHearts(hearts);

    const icon = document.getElementById("single-heart-icon");
    icon.textContent = "♥";
    icon.classList.remove("pop");
    void icon.offsetWidth;
    icon.classList.add("pop");

    showSpeechBubble(currentSingleQuote);
  }

  /* ════════════════════════════
     一覧（ハートつき）
  ════════════════════════════ */
  function showList(cat) {
    document.getElementById("list-cat-badge").textContent = cat;

    const hearts = getHearts();
    const list   = document.getElementById("word-list");
    list.innerHTML = "";

    words[cat].forEach(quote => {
      const count = hearts[quote] || 0;

      const item = document.createElement("div");
      item.className = "word-item";

      const textEl = document.createElement("div");
      textEl.className = "word-text";
      textEl.style.whiteSpace = "pre-line";
      textEl.textContent = formatQuote(quote);

      const heartBtn = document.createElement("button");
      heartBtn.className = "heart-btn";
      heartBtn.setAttribute("aria-label", "ハートを押す");
      heartBtn.innerHTML = `<span class="heart-icon">${count > 0 ? "♥" : "♡"}</span>`;
      heartBtn.onclick = () => tapListHeart(heartBtn, quote);

      item.appendChild(textEl);
      item.appendChild(heartBtn);
      list.appendChild(item);
    });

    showScreen("screen-list");
  }

  /* ── 一覧のハートタップ ── */
  function tapListHeart(btn, quote) {
    const hearts = getHearts();
    hearts[quote] = (hearts[quote] || 0) + 1;
    saveHearts(hearts);

    const icon = btn.querySelector(".heart-icon");
    icon.textContent = "♥";
    icon.classList.remove("pop");
    void icon.offsetWidth;
    icon.classList.add("pop");

    showSpeechBubble(quote);
  }

  /* ════════════════════════════
     ハート吹き出し演出
  ════════════════════════════ */
  const BUBBLE_MAX_CHARS = 40;

  function _showBubble(text, pos) {
    if (document.body.classList.contains("on-top")) return;

    const clipped = text.length > BUBBLE_MAX_CHARS ? text.slice(0, BUBBLE_MAX_CHARS) + "…" : text;
    // 幅をテキスト量で決定（178～252px）
    const w = Math.min(252, Math.max(178, 178 + Math.floor(clipped.length / 2) * 4));
    const h = Math.round(w * 0.88);

    const wrapper = document.createElement("div");
    wrapper.className = "heart-bubble-wrapper";

    // 位置（pos があれば固定位置、なければ右上）
    if (pos) {
      wrapper.style.top  = Math.max(8, pos.top - h - 8) + "px";
      wrapper.style.left = Math.max(8, Math.min(pos.right + 4, window.innerWidth - w - 8)) + "px";
    } else {
      wrapper.style.top   = "80px";
      wrapper.style.right = "12px";
    }

    // ハート型SVG
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "bubble-heart-svg");
    svg.setAttribute("width",  w);
    svg.setAttribute("height", h);
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

    const path = document.createElementNS(svgNS, "path");
    const cx = w / 2, cy = h * 0.54;
    const rx = w * 0.46, ry = h * 0.42;
    path.setAttribute("d",
      `M ${cx},${cy + ry * 0.85}
       C ${cx - rx * 0.1},${cy + ry * 1.15} ${cx - rx * 0.4},${cy + ry * 1.08} ${cx - rx * 0.55},${cy + ry * 0.72}
       C ${cx - rx * 0.9},${cy + ry * 0.52} ${cx - rx},${cy}
       C ${cx - rx},${cy - ry * 0.56} ${cx - rx * 0.55},${cy - ry} ${cx},${cy - ry * 0.62}
       C ${cx + rx * 0.55},${cy - ry} ${cx + rx},${cy - ry * 0.56} ${cx + rx},${cy}
       C ${cx + rx},${cy + ry * 0.52} ${cx + rx * 0.9},${cy + ry * 0.52} ${cx + rx * 0.55},${cy + ry * 0.72}
       C ${cx + rx * 0.4},${cy + ry * 1.08} ${cx + rx * 0.1},${cy + ry * 1.15} ${cx},${cy + ry * 0.85} Z`
    );
    path.setAttribute("fill", "#fff0f3");
    path.setAttribute("stroke", "#f4a0b0");
    path.setAttribute("stroke-width", "2");
    svg.appendChild(path);
    wrapper.appendChild(svg);

    // テキスト
    const textEl = document.createElement("div");
    textEl.className = "bubble-text";
    textEl.textContent = clipped;
    textEl.style.width  = Math.round(w * 0.74) + "px";
    textEl.style.left   = Math.round(w * 0.13) + "px";
    textEl.style.top    = Math.round(h * 0.18) + "px";
    wrapper.appendChild(textEl);

    document.body.appendChild(wrapper);
    setTimeout(() => wrapper.remove(), 10300);
  }

  function showSpeechBubble(text) {
    const corgi = document.getElementById("single-corgi");
    const rect  = corgi ? corgi.getBoundingClientRect() : null;
    _showBubble(text, rect && rect.width > 0
      ? { top: rect.top + window.scrollY + 8, right: rect.right + 6 }
      : null
    );
  }

  /* ════════════════════════════
     トップ画面：ハートの位置調整
  ════════════════════════════ */
  function positionTopHearts() {
    const card = document.querySelector(".spell-card");
    if (!card) return;
    const r = card.getBoundingClientRect();
    const spots = [
      { id: "tfh1", top: r.top - 14,              left: r.left + r.width * 0.28 },
      { id: "tfh2", top: r.top + r.height * 0.18, left: r.right + 6 },
      { id: "tfh3", top: r.top - 18,              left: r.right - r.width * 0.22 },
      { id: "tfh4", top: r.bottom + 4,            left: r.left + r.width * 0.55 },
      { id: "tfh5", top: r.top + r.height * 0.55, left: r.left - 18 },
    ];
    spots.forEach(({ id, top, left }) => {
      const el = document.getElementById(id);
      if (el) { el.style.top = top + "px"; el.style.left = left + "px"; el.style.right = ""; }
    });
  }

  /* ════════════════════════════
     ランキング表示
  ════════════════════════════ */
  function showRanking() {
    const hearts = getHearts();
    const list = document.getElementById("ranking-list");
    list.innerHTML = "";

    const all = [];
    Object.entries(words).forEach(([cat, quotes]) => {
      quotes.forEach(q => {
        const c = hearts[q] || 0;
        if (c > 0) all.push({ quote: q, cat, count: c });
      });
    });

    if (all.length === 0) {
      list.innerHTML = `<div class="empty-state">まだハートがありません 🤍<br>気に入った言葉にハートを押してみてね</div>`;
    } else {
      all.sort((a, b) => b.count - a.count);
      all.forEach(({ quote, cat, count }, i) => {
        const medal = ["🥇","🥈","🥉"][i];
        const numEl = medal
          ? `<div class="rank-num">${medal}</div>`
          : `<div class="rank-num normal">${i + 1}位</div>`;

        const item = document.createElement("div");
        item.className = "rank-item";
        item.innerHTML = `
          ${numEl}
          <div class="rank-body">
            <div class="rank-text">${quote}</div>
            <div class="rank-cat">${cat}</div>
          </div>
          <div class="rank-heart">♥ ${count}</div>
        `;
        list.appendChild(item);
      });
    }

    showScreen("screen-ranking");
  }

  /* ════════════════════════════
     初期化
  ════════════════════════════ */
  /* ════════════════════════════
     つぶやき → Claudeがことばを選ぶ
  ════════════════════════════ */
  async function findWord() {
    const feeling = document.getElementById("tsubuyaki-input").value.trim();
    if (!feeling) return;

    const btn     = document.getElementById("tsubuyaki-btn");
    const loading = document.getElementById("tsubuyaki-loading");

    // ローディング表示
    btn.disabled     = true;
    btn.textContent  = "探してるよ… 🐾";
    loading.textContent = "コーギーがぴったりの言葉を選んでいます…";

    // 全言葉をリスト化
    const quotes = [];
    Object.entries(words).forEach(([cat, qs]) => {
      qs.forEach(q => quotes.push({ quote: q, cat }));
    });

    try {
      const res = await fetch("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ feeling, quotes }),
      });

      if (!res.ok) throw new Error("API error");

      const { index } = await res.json();
      const matched = quotes[index];

      if (!matched) throw new Error("index out of range");

      // 結果を1枚表示画面で表示
      singleMode         = null;
      currentSingleQuote = matched.quote;
      currentSingleCat   = matched.cat;

      document.getElementById("single-corgi").innerHTML =
        FACES[CATEGORY_FACE[matched.cat] || "gentle"];
      document.getElementById("single-cat-badge").textContent = matched.cat;

      const quoteEl = document.getElementById("single-quote");
      quoteEl.style.opacity = "0";
      setTimeout(() => {
        quoteEl.textContent = formatQuote(matched.quote);
        quoteEl.style.opacity = "1";
      }, 120);

      refreshSingleHeart();
      showScreen("screen-single");

      // リセット
      document.getElementById("tsubuyaki-input").value = "";

    } catch (e) {
      loading.textContent = "うまく取得できませんでした。もう一度試してね 🙏";
    } finally {
      btn.disabled    = false;
      btn.textContent = "ことばを探す ✦";
      setTimeout(() => { loading.textContent = ""; }, 4000);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("on-top");
    newSpell();
    buildCategoryButtons();
    positionTopHearts();
    window.addEventListener("resize", positionTopHearts);
  });
</script>
